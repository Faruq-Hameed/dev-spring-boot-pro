<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/student}" th:object="${student}" method="POST">
    <p>Input your First Name</p>
    <input type="text" th:field="${student.firstName}">
    <br>
    <br>
    <p>Input your Last Name</p>
    <input type="text" th:field="*{lastName}">

    <input type="submit" value="Submit">
</form>
</body>
</html>
